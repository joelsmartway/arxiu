services:
  db:
    image: mysql:8.0
    container_name: arxiu_db
    restart: unless-stopped
    env_file:
      - .env.db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d
    networks:
      - arxiu_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "--password=$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: arxiu_api
    restart: unless-stopped
    env_file:
      - .env.api
    environment:
      DB_HOST: db
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./api/uploads:/app/uploads
    networks:
      - arxiu_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_BACK_URL: /api
    container_name: arxiu_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - arxiu_net

volumes:
  db_data:

networks:
  arxiu_net:
    driver: bridge
